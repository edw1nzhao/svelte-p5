name: release-please

# Stable release pipeline. A conventional-commit push to main opens/updates
# a release-please PR; merging it cuts tags + GitHub releases, and the
# publish-* jobs below call the reusable publish.yml to ship each affected
# package to npm with the `latest` dist-tag.
#
# Preview / canary builds are handled separately in ci.yml via pkg-pr-new —
# no dedicated workflow, no dist-tag, no manifest. See
# .github/CONTRIBUTING.md#branch--release-model for the full flow.

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      paths_released: ${{ steps.release.outputs.paths_released }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-core:
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' && contains(fromJson(needs.release-please.outputs.paths_released), 'packages/core') }}
    uses: ./.github/workflows/publish.yml
    with:
      package-dir: packages/core
      npm-tag: latest

  publish-components:
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' && contains(fromJson(needs.release-please.outputs.paths_released), 'packages/components') }}
    uses: ./.github/workflows/publish.yml
    with:
      package-dir: packages/components
      npm-tag: latest

  publish-viz:
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' && contains(fromJson(needs.release-please.outputs.paths_released), 'packages/viz') }}
    uses: ./.github/workflows/publish.yml
    with:
      package-dir: packages/viz
      npm-tag: latest
