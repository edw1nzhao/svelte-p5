name: release-please (next)

# Prerelease pipeline. Mirrors release-please.yml but targets the `next`
# branch, uses a separate manifest and config so alpha versions don't
# collide with stable, and publishes with the `next` dist-tag so
# `pnpm add svelte-p5` still resolves to latest while
# `pnpm add svelte-p5@next` pulls the alpha.
#
# Flow:
# - A conventional-commit push to `next` triggers release-please to open a
#   release PR on `next`. Merging that PR cuts a prerelease
#   (e.g. 0.2.2 → 0.3.0-alpha.0 → 0.3.0-alpha.1).
# - Publish jobs call the reusable publish.yml with --tag next.
# - When an alpha stabilises, merge `next` into `main` and the stable
#   pipeline promotes it (dropping the -alpha.N suffix).
#
# Keep the alpha manifest and config files (.release-please-manifest-next.json,
# release-please-config-next.json, CHANGELOG-next.md) isolated to this branch.
# See .github/CONTRIBUTING.md#branch--release-model.

on:
  push:
    branches: [next]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      paths_released: ${{ steps.release.outputs.paths_released }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config-next.json
          manifest-file: .release-please-manifest-next.json
          target-branch: next

  publish-core:
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' && contains(fromJson(needs.release-please.outputs.paths_released), 'packages/core') }}
    uses: ./.github/workflows/publish.yml
    with:
      package-dir: packages/core
      npm-tag: next
      ref: next

  publish-components:
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' && contains(fromJson(needs.release-please.outputs.paths_released), 'packages/components') }}
    uses: ./.github/workflows/publish.yml
    with:
      package-dir: packages/components
      npm-tag: next
      ref: next

  publish-viz:
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' && contains(fromJson(needs.release-please.outputs.paths_released), 'packages/viz') }}
    uses: ./.github/workflows/publish.yml
    with:
      package-dir: packages/viz
      npm-tag: next
      ref: next
