packages:
  - 'packages/*'
  - 'site'
  - 'bench'
  - 'docs/examples/*'

# Centralized devDep versions — referenced as "catalog:" in each
# package.json so Renovate/dependabot touches one file instead of five.
catalog:
  '@sveltejs/package': ^2.3.7
  '@sveltejs/vite-plugin-svelte': ^5.0.0
  '@testing-library/jest-dom': ^6.6.0
  '@testing-library/svelte': ^5.2.0
  '@testing-library/user-event': ^14.5.0
  '@tsconfig/svelte': ^5.0.0
  '@types/p5': ^1.7.6
  '@vitest/coverage-v8': ^3.0.0
  happy-dom: ^15.0.0
  p5: ^1.11.0
  publint: ^0.3.0
  svelte: ^5.0.0
  svelte-check: ^4.1.0
  tslib: ^2.8.0
  typescript: ^5.7.0
  vite: ^8.0.9
  vitest: ^4.1.5
