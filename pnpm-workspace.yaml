packages:
  - 'packages/*'
  - 'site'
  - 'bench'
  - 'docs/examples/*'

# Centralized devDep versions — referenced as "catalog:" in each
# package.json so Renovate/dependabot touches one file instead of five.
catalog:
  '@sveltejs/package': ^2.3.7
  '@sveltejs/vite-plugin-svelte': ^5.0.0
  '@tsconfig/svelte': ^5.0.0
  '@types/p5': ^1.7.6
  p5: ^1.11.0
  publint: ^0.3.0
  svelte: ^5.0.0
  svelte-check: ^4.1.0
  tslib: ^2.8.0
  typescript: ^5.7.0
  vite: ^6.0.0
  vitest: ^3.0.0
