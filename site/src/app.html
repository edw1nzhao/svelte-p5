<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="theme-color" content="#6366f1" />
		<meta name="color-scheme" content="light" />

		<title>svelte-p5 — creative coding for Svelte 5, reactively</title>
		<!-- Meta description pulls double duty: (1) Describes the library
		     for search-engine surface area with the exact phrases the
		     audience searches ("Svelte 5 p5.js", "creative coding"), and
		     (2) signals the p5-svelte successor relationship so the first
		     search result for "p5 svelte" disambiguates itself from the
		     4-year-old incumbent. Length ≈155 chars, Google's ceiling. -->
		<meta
			name="description"
			content="A Svelte 5 toolkit for p5.js creative coding. Reactive $state bridge, clean lifecycles, HiDPI components. Successor to p5-svelte, built for Svelte 5 runes."
		/>
		<link rel="canonical" href="https://svelte-p5.dev/" />

		<!-- Open Graph -->
		<meta property="og:type" content="website" />
		<meta property="og:site_name" content="svelte-p5" />
		<meta property="og:title" content="svelte-p5 — creative coding for Svelte 5, reactively" />
		<meta
			property="og:description"
			content="A Svelte 5 toolkit for p5.js: reactive $state bridge, clean lifecycles, HiDPI components. Creative coding that feels native to Svelte."
		/>
		<meta property="og:url" content="https://svelte-p5.dev/" />
		<meta property="og:image" content="https://svelte-p5.dev/og.svg" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />

		<!-- Twitter -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="svelte-p5 — creative coding for Svelte 5, reactively" />
		<meta
			name="twitter:description"
			content="A Svelte 5 toolkit for p5.js: reactive $state bridge, clean lifecycles, HiDPI components."
		/>
		<meta name="twitter:image" content="https://svelte-p5.dev/og.svg" />

		<!-- Additional search signals for the p5 + creative-coding audience
		     and educators. Keywords meta isn't weighted by Google directly,
		     but helps Bing and appears in LLM index snippets. -->
		<meta
			name="keywords"
			content="svelte, p5.js, creative coding, generative art, svelte 5, runes, p5-svelte, data visualization, interactive web, teaching code, Processing, canvas"
		/>

		<!-- Icons -->
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<link rel="apple-touch-icon" href="/apple-touch-icon.svg" />
		<link rel="manifest" href="/site.webmanifest" />

		<!-- Fonts: self-hosted via @fontsource-variable (imported in app.css).
		     Preloaded by the hooks.server.ts resolve filter so FCP/LCP isn't
		     blocked on font CSS discovery. -->

		<!-- Hero badges load from shields.io — warm the connection early so
		     the TLS handshake isn't a waterfall bottleneck for their images. -->
		<link rel="preconnect" href="https://img.shields.io" crossorigin />

		<!-- JSON-LD: SoftwareSourceCode. Description mirrors the meta
		     description so snippet consistency holds across search / LLM /
		     structured-data surfaces. -->
		<script type="application/ld+json">
			{
				"@context": "https://schema.org",
				"@type": "SoftwareSourceCode",
				"name": "svelte-p5",
				"description": "A Svelte 5 toolkit for p5.js creative coding. Reactive $state bridge, clean lifecycles, HiDPI components. Successor to p5-svelte, built for Svelte 5 runes.",
				"codeRepository": "https://github.com/edw1nzhao/svelte-p5",
				"programmingLanguage": ["TypeScript", "Svelte"],
				"license": "https://opensource.org/licenses/MIT",
				"author": {
					"@type": "Person",
					"name": "Edwin Zhao",
					"url": "https://github.com/edw1nzhao"
				}
			}
		</script>

		%sveltekit.head%

		<!-- Cloudflare Web Analytics -->
		<script
			defer
			src="https://static.cloudflareinsights.com/beacon.min.js"
			data-cf-beacon='{"token": "6a4cc702496441a8af827a04f78ff9f7"}'
		></script>
		<!-- End Cloudflare Web Analytics -->
	</head>
	<body data-sveltekit-preload-data="hover">
		<a class="skip-link" href="#main">Skip to content</a>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
